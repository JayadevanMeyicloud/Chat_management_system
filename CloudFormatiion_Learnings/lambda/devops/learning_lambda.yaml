AWSTemplateFormatVersion: '2010-09-09'

Resources:

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cf-learning-lambda-role

      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole


  HelloWorldLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: jayadevan-cf-hello-world

      Runtime: python3.13

      Handler: index.lambda_handler

      Role: !GetAtt LambdaExecutionRole.Arn

      Timeout: 20

      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "Hello from CloudFormation!"
              }